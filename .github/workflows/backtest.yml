name: backtest

# Runs the walk-forward backtest on GitHub's runners (which HAVE internet),
# so you get REAL profit/risk numbers in the logs without any local setup.
# Trigger manually from the Actions tab ("Run workflow"), or on push.

on:
  workflow_dispatch:
    inputs:
      universe:
        description: "Universe (nifty50 | nifty100 | nifty200 | midcap)"
        default: "nifty100"
        type: string
      rebalance:
        description: "Rebalance frequency (ME monthly, W-FRI weekly)"
        default: "ME"
        type: string
      top_n:
        description: "Number of stocks held"
        default: "20"
        type: string
      start:
        description: "Start date"
        default: "2016-01-01"
        type: string
  push:
    branches: ["**"]
    paths: ["edgefinder/**", "run.py", "requirements.txt", ".github/workflows/backtest.yml"]

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        env:
          # Optional: add a free GROQ_API_KEY as a repo secret to enable the
          # LLM sentiment layer. Baseline runs fine without it.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python run.py \
            --universe "${{ github.event.inputs.universe || 'nifty100' }}" \
            --rebalance "${{ github.event.inputs.rebalance || 'ME' }}" \
            --top-n "${{ github.event.inputs.top_n || 20 }}" \
            --start "${{ github.event.inputs.start || '2016-01-01' }}"

      - name: Upload results (equity curves + plot)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: results/
          if-no-files-found: warn
